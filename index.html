<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshai Mart - Công Cụ Tính Giá Bán</title>
    <link rel="icon" type="image/x-icon" href="https://framerusercontent.com/images/RldHDnWU8w5VwWOAOitpoNZ2ZQ.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        genshaiYellow: '#FFCD1E',
                        genshaiBlue: '#2C4295',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .price-card { transition: all 0.3s ease; }
        .price-card:hover { transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2C4295; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f0f2f8] p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white p-6 md:p-8 rounded-3xl shadow-2xl border-t-8 border-genshaiYellow">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 border-b border-slate-100 pb-8">
            <h1 class="text-2xl font-black text-genshaiBlue uppercase tracking-tight flex items-center gap-3">
                <span class="bg-genshaiYellow text-genshaiBlue px-3 py-1 rounded-lg">GENSHAI MART</span> 
                Tính Giá Bán Lẻ <span class="text-slate-400 font-medium lowercase">v2.0</span>
            </h1>
            <div id="status-tag" class="px-4 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-full animate-pulse uppercase tracking-widest">
                ⏳ Đang nạp Master Data...
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-2 bg-slate-50/50 p-6 rounded-2xl border-2 border-dashed border-slate-200">
                <label class="block text-xs font-black text-slate-400 uppercase mb-3 tracking-widest">01. Import file giá vốn</label>
                <input type="file" id="inputFile" accept=".xlsx, .xls" 
                       class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-black file:uppercase file:bg-genshaiBlue file:text-white hover:file:bg-blue-800 cursor-pointer transition-all"/>
            </div>
            <div class="flex flex-col justify-end">
                <button id="downloadTemplate" class="w-full py-4 border-2 border-genshaiBlue text-genshaiBlue font-black text-xs uppercase tracking-widest rounded-2xl hover:bg-genshaiBlue hover:text-white transition-all">
                    Tải Template Mẫu
                </button>
            </div>
        </div>

        <div id="resultSection" class="hidden space-y-6">
            <div class="flex justify-between items-end border-b-2 border-slate-100 pb-4">
                <h3 class="font-black text-genshaiBlue uppercase text-sm tracking-widest">Bảng tính toán chi tiết</h3>
                <button id="exportBtn" class="bg-genshaiBlue text-genshaiYellow px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg hover:scale-105 transition-all active:scale-95">
                    Xuất file kết quả
                </button>
            </div>

            <div class="overflow-hidden rounded-2xl border border-slate-200 shadow-sm bg-white">
                <table class="min-w-full text-sm">
                    <thead class="bg-genshaiBlue text-white">
                        <tr>
                            <th class="px-6 py-5 font-black uppercase tracking-wider text-[10px]">Barcode</th>
                            <th class="px-6 py-5 font-black uppercase tracking-wider text-[10px]">Tên hàng hoá</th>
                            <th class="px-6 py-5 font-black uppercase tracking-wider text-[10px] text-right">Giá vốn</th>
                            <th class="px-6 py-5 font-black uppercase tracking-wider text-[10px] text-right bg-blue-800/50">Giá KV 1 (21%)</th>
                            <th class="px-6 py-5 font-black uppercase tracking-wider text-[10px] text-right bg-green-800/50">Giá KV 2 (19%)</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100 font-semibold text-slate-600"></tbody>
                </table>
            </div>
        </div>

        <div class="mt-8 text-[10px] text-slate-400 italic bg-genshaiYellow/5 p-4 rounded-lg border border-genshaiYellow/20">
            * Ghi chú: Giá bán được tính theo công thức (Giá vốn / (1 - %Lợi nhuận)) * (1 + %VAT) và làm tròn xuống hàng trăm.
        </div>
    </div>

    <script>
        let masterDataMap = {};
        let finalResults = [];

        const getVal = (row, target) => {
            const key = Object.keys(row).find(k => k.toLowerCase().trim() === target.toLowerCase().trim());
            return key ? row[key] : null;
        };

        const normalizePercent = (val) => {
            let n = parseFloat(val) || 0;
            return n > 1 ? n / 100 : n;
        };

        const roundDownToHundred = (num) => Math.floor(num / 100) * 100;

        // Load Master Data
        window.onload = async () => {
            const statusTag = document.getElementById('status-tag');
            try {
                const response = await fetch('master_data.xlsx?v=' + new Date().getTime());
                if (!response.ok) throw new Error();
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    if (bc) {
                        masterDataMap[bc.toString().trim()] = {
                            name: getVal(row, 'tên hàng hoá') || "N/A",
                            m1: normalizePercent(getVal(row, 'lợi nhuận Khu vực 1')),
                            m2: normalizePercent(getVal(row, 'lợi nhuận Khu vực 2')),
                            vat: normalizePercent(getVal(row, 'VAT'))
                        };
                    }
                });
                statusTag.innerText = "● Hệ thống sẵn sàng";
                statusTag.className = "px-4 py-1 bg-genshaiYellow text-genshaiBlue text-xs font-bold rounded-full uppercase tracking-widest";
            } catch (e) {
                statusTag.innerText = "● Lỗi dữ liệu Master";
                statusTag.className = "px-4 py-1 bg-red-100 text-red-600 text-xs font-bold rounded-full";
            }
        };

        // File Processing
        document.getElementById('inputFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(event.target.result, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                finalResults = [];
                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';

                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    let barcode = bc ? bc.toString().trim() : '';
                    let cost = parseFloat(getVal(row, 'giá vốn')) || 0;
                    let master = masterDataMap[barcode] || null;

                    let p1 = 0, p2 = 0;
                    if (master) {
                        p1 = roundDownToHundred((cost / (1 - master.m1)) * (1 + master.vat));
                        p2 = roundDownToHundred((cost / (1 - master.m2)) * (1 + master.vat));
                    }

                    finalResults.push({ 'Barcode': barcode, 'Tên hàng hoá': master ? master.name : 'N/A', 'Giá vốn': cost, 'Giá bán KV 1': p1, 'Giá bán KV 2': p2 });
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-all">
                            <td class="px-6 py-5 font-black text-genshaiBlue">${barcode}</td>
                            <td class="px-6 py-5 text-slate-500">${master ? master.name : 'N/A'}</td>
                            <td class="px-6 py-5 text-right">${cost.toLocaleString('vi-VN')}</td>
                            <td class="px-6 py-5 text-right font-black text-blue-700 bg-blue-50/30 border-l border-white">${p1.toLocaleString('vi-VN')}</td>
                            <td class="px-6 py-5 text-right font-black text-green-700 bg-green-50/30 border-l border-white">${p2.toLocaleString('vi-VN')}</td>
                        </tr>
                    `;
                });
                document.getElementById('resultSection').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(file);
        });

        // Templates & Exports
        document.getElementById('downloadTemplate').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet([{ "barcode": "893...", "giá vốn": 0 }]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Template_Gia_Von_Genshai.xlsx");
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(finalResults);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Bang_Gia");
            XLSX.writeFile(wb, `Bao_Gia_Genshai_${new Date().toLocaleDateString('vi-VN')}.xlsx`);
        });
    </script>
</body>
</html>
