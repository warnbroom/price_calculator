<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính giá bán - Genshai Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-bold text-blue-800">Công cụ tính giá bán</h1>
            <div id="status" class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 font-medium">
                Đang tải Master Data...
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                <h2 class="text-xl font-semibold">Upload File Giá Vốn</h2>
                <button id="downloadTemplate" class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold py-2 px-4 border border-blue-200 rounded flex items-center transition-colors">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="Path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Tải file mẫu (.xlsx)
                </button>
            </div>
            
            <input type="file" id="inputFile" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer" disabled />
            <p class="text-xs text-gray-500 mt-2 italic">* File tải lên cần chứa cột: <span class="font-bold text-gray-700">barcode</span> và <span class="font-bold text-gray-700">giá vốn</span></p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow border border-gray-200 hidden" id="resultSection">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Kết Quả Tính Toán</h2>
                <button id="exportBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition-transform active:scale-95">
                    Xuất File Kết Quả
                </button>
            </div>
            <div class="overflow-x-auto border rounded">
                <table class="min-w-full text-left text-sm">
                    <thead class="bg-gray-100 text-gray-700 uppercase text-xs font-bold">
                        <tr>
                            <th class="px-4 py-3 border-b">Barcode</th>
                            <th class="px-4 py-3 border-b">Tên hàng hoá</th>
                            <th class="px-4 py-3 border-b text-right">Giá vốn</th>
                            <th class="px-4 py-3 border-b text-right">Giá bán KV 1</th>
                            <th class="px-4 py-3 border-b text-right">Giá bán KV 2</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let masterDataMap = {};
        let finalResults = [];

        // 1. Tự động tải Master Data từ server (GitHub)
        window.onload = async () => {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch('master_data.xlsx');
                if (!response.ok) throw new Error('File master_data.xlsx không tồn tại trên repository.');
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                data.forEach(row => {
                    if (row['barcode']) {
                        masterDataMap[row['barcode'].toString().trim()] = {
                            name: row['tên hàng hoá'] || "N/A",
                            margin1: normalizePercent(row['lợi nhuận Khu vực 1']),
                            margin2: normalizePercent(row['lợi nhuận Khu vực 2']),
                            vat: normalizePercent(row['VAT'])
                        };
                    }
                });

                statusEl.innerText = '● Master Data: Sẵn sàng';
                statusEl.className = 'text-sm px-3 py-1 rounded-full bg-green-100 text-green-700 font-medium';
                document.getElementById('inputFile').disabled = false;
            } catch (error) {
                statusEl.innerText = '● Lỗi: Thiếu Master Data';
                statusEl.className = 'text-sm px-3 py-1 rounded-full bg-red-100 text-red-700 font-medium';
                console.error(error);
            }
        };

        // 2. Chức năng tải File Template cho User
        document.getElementById('downloadTemplate').addEventListener('click', () => {
            const templateData = [
                { "barcode": "Ví dụ: 893000111", "giá vốn": 50000 }
            ];
            const ws = XLSX.utils.json_to_sheet(templateData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Template_Gia_Von.xlsx");
        });

        function normalizePercent(val) {
            let n = parseFloat(val) || 0;
            return n > 1 ? n / 100 : n;
        }

        // 3. Xử lý File Giá Vốn và Tính toán
        document.getElementById('inputFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(event.target.result, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                finalResults = [];
                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';

                data.forEach(row => {
                    let barcode = row['barcode'] ? row['barcode'].toString().trim() : '';
                    let cost = parseFloat(row['giá vốn']) || 0;
                    let master = masterDataMap[barcode] || null;

                    let res = {
                        'Barcode': barcode,
                        'Tên hàng hoá': master ? master.name : 'Không tìm thấy trong Master Data',
                        'Giá vốn': cost,
                        'Giá bán Khu vực 1': master ? Math.round((cost / (1 - master.margin1)) * (1 + master.vat)) : 0,
                        'Giá bán Khu vực 2': master ? Math.round((cost / (1 - master.margin2)) * (1 + master.vat)) : 0
                    };

                    finalResults.push(res);
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-4 py-3 border-b font-mono">${res['Barcode']}</td>
                        <td class="px-4 py-3 border-b">${res['Tên hàng hoá']}</td>
                        <td class="px-4 py-3 border-b text-right">${res['Giá vốn'].toLocaleString('vi-VN')}</td>
                        <td class="px-4 py-3 border-b text-right text-blue-700 font-bold">${res['Giá bán Khu vực 1'].toLocaleString('vi-VN')}</td>
                        <td class="px-4 py-3 border-b text-right text-green-700 font-bold">${res['Giá bán Khu vực 2'].toLocaleString('vi-VN')}</td>
                    `;
                    tbody.appendChild(tr);
                });
                document.getElementById('resultSection').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(file);
        });

        // 4. Xuất kết quả
        document.getElementById('exportBtn').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(finalResults);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Bang_Tinh_Gia");
            XLSX.writeFile(wb, "Ket_Qua_Gia_Ban_Genshai.xlsx");
        });
    </script>
</body>
</html>
