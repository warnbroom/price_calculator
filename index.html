<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính giá bán - Genshai Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-bold text-blue-800">Công cụ tính giá bán</h1>
            <div id="status" class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 font-medium">
                Đang nạp Master Data...
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                <h2 class="text-xl font-semibold">1. Upload File Giá Vốn</h2>
                <button id="downloadTemplate" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded border">
                    Tải file mẫu (.xlsx)
                </button>
            </div>
            <input type="file" id="inputFile" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
        </div>

        <div class="bg-white p-6 rounded-lg shadow border border-gray-200 hidden" id="resultSection">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-gray-700">2. Kết Quả</h2>
                <button id="exportBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-6 rounded shadow-lg transition-transform active:scale-95">
                    Xuất File Excel
                </button>
            </div>
            <div class="overflow-x-auto rounded-lg border border-gray-100">
                <table class="min-w-full text-left text-sm">
                    <thead class="bg-slate-800 text-white uppercase text-xs">
                        <tr>
                            <th class="px-4 py-4">Barcode</th>
                            <th class="px-4 py-4">Tên hàng hoá</th>
                            <th class="px-4 py-4 text-right">Giá vốn</th>
                            <th class="px-4 py-4 text-right bg-blue-900">Giá bán KV 1</th>
                            <th class="px-4 py-4 text-right bg-green-900">Giá bán KV 2</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let masterDataMap = {};
        let finalResults = [];

        // Helper tìm key không phân biệt hoa thường/khoảng trắng
        const getVal = (row, target) => {
            const key = Object.keys(row).find(k => k.toLowerCase().trim() === target.toLowerCase().trim());
            return key ? row[key] : null;
        };

        const normalizePercent = (val) => {
            let n = parseFloat(val) || 0;
            return n > 1 ? n / 100 : n;
        };

        // Logic làm tròn xuống hàng trăm
        const roundDownToHundred = (num) => {
            return Math.floor(num / 100) * 100;
        };

        window.onload = async () => {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch('master_data.xlsx?v=' + Date.now());
                if (!response.ok) throw new Error();
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    if (bc) {
                        masterDataMap[bc.toString().trim()] = {
                            name: getVal(row, 'tên hàng hoá') || "N/A",
                            m1: normalizePercent(getVal(row, 'lợi nhuận Khu vực 1')),
                            m2: normalizePercent(getVal(row, 'lợi nhuận Khu vực 2')),
                            vat: normalizePercent(getVal(row, 'VAT'))
                        };
                    }
                });
                statusEl.innerText = '● Master Data: Sẵn sàng';
                statusEl.className = 'text-sm px-3 py-1 rounded-full bg-green-100 text-green-700 font-medium';
            } catch (e) {
                statusEl.innerText = '● Lỗi: Không nạp được master_data.xlsx';
                statusEl.className = 'text-sm px-3 py-1 rounded-full bg-red-100 text-red-700 font-medium';
            }
        };

        document.getElementById('inputFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(event.target.result, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                finalResults = [];
                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';

                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    let barcode = bc ? bc.toString().trim() : '';
                    let cost = parseFloat(getVal(row, 'giá vốn')) || 0;
                    let master = masterDataMap[barcode] || null;

                    let p1 = 0, p2 = 0;
                    if (master) {
                        // Công thức: (giá vốn / (1 - %lợi nhuận)) * (1 + %VAT)
                        let rawP1 = (cost / (1 - master.m1)) * (1 + master.vat);
                        let rawP2 = (cost / (1 - master.m2)) * (1 + master.vat);
                        
                        p1 = roundDownToHundred(rawP1);
                        p2 = roundDownToHundred(rawP2);
                    }

                    let res = {
                        'Barcode': barcode,
                        'Tên hàng hoá': master ? master.name : 'N/A',
                        'Giá vốn': cost,
                        'Giá bán KV 1': p1,
                        'Giá bán KV 2': p2
                    };

                    finalResults.push(res);
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition-colors text-gray-700";
                    tr.innerHTML = `
                        <td class="px-4 py-4 border-b font-mono font-bold">${res['Barcode']}</td>
                        <td class="px-4 py-4 border-b">${res['Tên hàng hoá']}</td>
                        <td class="px-4 py-4 border-b text-right">${res['Giá vốn'].toLocaleString('vi-VN')}</td>
                        <td class="px-4 py-4 border-b text-right text-blue-700 font-bold bg-blue-50/50">${res['Giá bán KV 1'].toLocaleString('vi-VN')}</td>
                        <td class="px-4 py-4 border-b text-right text-green-700 font-bold bg-green-50/50">${res['Giá bán KV 2'].toLocaleString('vi-VN')}</td>
                    `;
                    tbody.appendChild(tr);
                });
                document.getElementById('resultSection').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('downloadTemplate').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet([{ "barcode": "893...", "giá vốn": 72000 }]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Template_Genshai.xlsx");
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(finalResults);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Gia_Ban");
            XLSX.writeFile(wb, `Genshai_Gia_Ban_${new Date().toLocaleDateString('vi-VN').replace(/\//g, '-')}.xlsx`);
        });
    </script>
</body>
</html>
