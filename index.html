<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshai Mart - Price Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --genshai-blue: #1e3a8a;
            --genshai-yellow: #FFD700;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            min-height: 100vh;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .btn-genshai {
            background: linear-gradient(135deg, var(--genshai-blue) 0%, #3b82f6 100%);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-genshai:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(30, 58, 138, 0.3);
        }
        .btn-outline {
            border: 2px solid var(--genshai-blue);
            color: var(--genshai-blue);
            transition: all 0.2s;
        }
        .btn-outline:hover {
            background: rgba(30, 58, 138, 0.05);
        }
        .status-badge {
            background: var(--genshai-yellow);
            color: var(--genshai-blue);
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);
        }
        .table-header {
            background-color: var(--genshai-blue);
            color: white;
        }
        .price-col-1 { color: #1e40af; background-color: #eff6ff; font-weight: 700; }
        .price-col-2 { color: #166534; background-color: #f0fdf4; font-weight: 700; }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800">
    <div class="max-w-6xl mx-auto">
        <header class="glass-container p-8 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-900 rounded-xl flex items-center justify-center text-white font-bold text-2xl shadow-lg">G</div>
                <div>
                    <h1 class="text-2xl font-black text-blue-900 uppercase tracking-tighter italic">Genshai Mart</h1>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Retail Intelligence System</p>
                </div>
            </div>
            <div id="status" class="status-badge px-6 py-2 rounded-full text-xs font-black uppercase tracking-wider animate-pulse">
                Syncing Master Data...
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
            <div class="md:col-span-2 glass-container p-8">
                <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">01. Import Cost Data</label>
                <input type="file" id="inputFile" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-6 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-xs file:font-black file:uppercase file:bg-blue-900 file:text-white hover:file:opacity-90 cursor-pointer border-2 border-dashed border-slate-200 rounded-2xl p-4 bg-slate-50/50"/>
            </div>
            <div class="glass-container p-8 flex flex-col justify-center gap-4">
                <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest text-center">Resources</label>
                <button id="downloadTemplate" class="btn-outline w-full py-3 rounded-2xl text-xs font-black uppercase tracking-widest">
                    Get Template
                </button>
            </div>
        </div>

        <main class="glass-container p-8 hidden overflow-hidden" id="resultSection">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-xl font-black text-blue-900 uppercase italic">Price Calculations</h2>
                <button id="exportBtn" class="btn-genshai px-10 py-3 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl">
                    Download Report
                </button>
            </div>
            
            <div class="rounded-2xl border border-slate-100 overflow-hidden shadow-sm bg-white">
                <table class="min-w-full text-sm">
                    <thead class="table-header">
                        <tr>
                            <th class="px-6 py-5 font-bold uppercase tracking-wider text-[11px]">Barcode</th>
                            <th class="px-6 py-5 font-bold uppercase tracking-wider text-[11px]">Product Name</th>
                            <th class="px-6 py-5 font-bold uppercase tracking-wider text-[11px] text-right border-l border-blue-800/30">Cost</th>
                            <th class="px-6 py-5 font-bold uppercase tracking-wider text-[11px] text-right border-l border-blue-800/30">Retail KV1</th>
                            <th class="px-6 py-5 font-bold uppercase tracking-wider text-[11px] text-right border-l border-blue-800/30">Retail KV2</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let masterDataMap = {};
        let finalResults = [];

        const getVal = (row, target) => {
            const key = Object.keys(row).find(k => k.toLowerCase().trim() === target.toLowerCase().trim());
            return key ? row[key] : null;
        };

        const normalizePercent = (val) => {
            let n = parseFloat(val) || 0;
            return n > 1 ? n / 100 : n;
        };

        const roundDownToHundred = (num) => Math.floor(num / 100) * 100;

        window.onload = async () => {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch('master_data.xlsx?v=' + Date.now());
                if (!response.ok) throw new Error();
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    if (bc) {
                        masterDataMap[bc.toString().trim()] = {
                            name: getVal(row, 'tên hàng hoá') || "N/A",
                            m1: normalizePercent(getVal(row, 'lợi nhuận Khu vực 1')),
                            m2: normalizePercent(getVal(row, 'lợi nhuận Khu vực 2')),
                            vat: normalizePercent(getVal(row, 'VAT'))
                        };
                    }
                });
                statusEl.innerText = '● Master Data: Connected';
                statusEl.classList.remove('animate-pulse');
                statusEl.className = 'px-6 py-2 rounded-full text-xs font-black uppercase tracking-wider bg-green-500 text-white shadow-lg shadow-green-200';
            } catch (e) {
                statusEl.innerText = '● Data Error';
                statusEl.className = 'px-6 py-2 rounded-full text-xs font-black uppercase tracking-wider bg-red-500 text-white';
            }
        };

        document.getElementById('inputFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(event.target.result, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                finalResults = [];
                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';

                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    let barcode = bc ? bc.toString().trim() : '';
                    let cost = parseFloat(getVal(row, 'giá vốn')) || 0;
                    let master = masterDataMap[barcode] || null;

                    let p1 = 0, p2 = 0;
                    if (master) {
                        p1 = roundDownToHundred((cost / (1 - master.m1)) * (1 + master.vat));
                        p2 = roundDownToHundred((cost / (1 - master.m2)) * (1 + master.vat));
                    }

                    finalResults.push({ 'Barcode': barcode, 'Tên hàng hoá': master ? master.name : 'N/A', 'Giá vốn': cost, 'Giá bán KV 1': p1, 'Giá bán KV 2': p2 });
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-5 font-mono font-bold text-blue-900">${barcode}</td>
                        <td class="px-6 py-5 text-slate-500 font-medium">${master ? master.name : 'N/A'}</td>
                        <td class="px-6 py-5 text-right font-bold text-slate-700 border-l border-slate-50">${cost.toLocaleString('vi-VN')}</td>
                        <td class="px-6 py-5 text-right price-col-1 border-l border-slate-50">${p1.toLocaleString('vi-VN')}</td>
                        <td class="px-6 py-5 text-right price-col-2 border-l border-slate-50">${p2.toLocaleString('vi-VN')}</td>
                    `;
                    tbody.appendChild(tr);
                });
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('downloadTemplate').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet([{ "barcode": "893...", "giá vốn": 0 }]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Genshai_Template.xlsx");
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(finalResults);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Prices");
            XLSX.writeFile(wb, `Genshai_Report_${new Date().getTime()}.xlsx`);
        });
    </script>
</body>
</html>
