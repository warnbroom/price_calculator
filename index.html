<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshai Mart - Công cụ tính giá bán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .btn-primary {
            background: linear-gradient(to right, #1e3a8a, #3b82f6);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-success {
            background: linear-gradient(to right, #059669, #10b981);
        }

        .table-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        thead {
            background: #1e293b;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="glass-card rounded-2xl p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 uppercase tracking-tight">Genshai Mart</h1>
                <p class="text-slate-500 text-sm">Công cụ tính toán giá bán lẻ nội bộ</p>
            </div>
            <div id="status" class="text-xs px-4 py-2 rounded-full bg-slate-100 text-slate-600 font-bold border border-slate-200">
                ĐANG NẠP MASTER DATA...
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="md:col-span-2 glass-card rounded-2xl p-6">
                <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">1. Nhập liệu giá vốn</h2>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="file" id="inputFile" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-dashed border-slate-300 rounded-xl p-2"/>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 flex flex-col justify-center items-center text-center">
                <h2 class="text-xs font-bold text-slate-400 uppercase mb-3">Tài liệu chuẩn</h2>
                <button id="downloadTemplate" class="w-full py-2.5 text-sm font-bold text-blue-600 border-2 border-blue-100 rounded-xl hover:bg-blue-50 transition-all">
                    Tải File Mẫu
                </button>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 hidden shadow-2xl" id="resultSection">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-slate-800">Bảng tính giá chi tiết</h2>
                <button id="exportBtn" class="btn-success text-white font-bold py-2.5 px-8 rounded-xl shadow-lg transition-all active:scale-95 text-sm">
                    XUẤT EXCEL
                </button>
            </div>
            
            <div class="table-container border border-slate-100 bg-white">
                <table class="min-w-full text-left text-sm">
                    <thead>
                        <tr>
                            <th class="px-6 py-4 text-white font-semibold">BARCODE</th>
                            <th class="px-6 py-4 text-white font-semibold">TÊN HÀNG HOÁ</th>
                            <th class="px-6 py-4 text-white font-semibold text-right">GIÁ VỐN</th>
                            <th class="px-6 py-4 text-white font-semibold text-right bg-blue-800">GIÁ BÁN KV 1</th>
                            <th class="px-6 py-4 text-white font-semibold text-right bg-green-800">GIÁ BÁN KV 2</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let masterDataMap = {};
        let finalResults = [];

        const getVal = (row, target) => {
            const key = Object.keys(row).find(k => k.toLowerCase().trim() === target.toLowerCase().trim());
            return key ? row[key] : null;
        };

        const normalizePercent = (val) => {
            let n = parseFloat(val) || 0;
            return n > 1 ? n / 100 : n;
        };

        const roundDownToHundred = (num) => Math.floor(num / 100) * 100;

        window.onload = async () => {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch('master_data.xlsx?v=' + Date.now());
                if (!response.ok) throw new Error();
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    if (bc) {
                        masterDataMap[bc.toString().trim()] = {
                            name: getVal(row, 'tên hàng hoá') || "N/A",
                            m1: normalizePercent(getVal(row, 'lợi nhuận Khu vực 1')),
                            m2: normalizePercent(getVal(row, 'lợi nhuận Khu vực 2')),
                            vat: normalizePercent(getVal(row, 'VAT'))
                        };
                    }
                });
                statusEl.innerText = '● MASTER DATA: SẴN SÀNG';
                statusEl.className = 'text-xs px-4 py-2 rounded-full bg-green-50 text-green-600 font-bold border border-green-200';
            } catch (e) {
                statusEl.innerText = '● LỖI KẾT NỐI DỮ LIỆU';
                statusEl.className = 'text-xs px-4 py-2 rounded-full bg-red-50 text-red-600 font-bold border border-red-200';
            }
        };

        document.getElementById('inputFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(event.target.result, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                finalResults = [];
                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';

                data.forEach(row => {
                    let bc = getVal(row, 'barcode');
                    let barcode = bc ? bc.toString().trim() : '';
                    let cost = parseFloat(getVal(row, 'giá vốn')) || 0;
                    let master = masterDataMap[barcode] || null;

                    let p1 = 0, p2 = 0;
                    if (master) {
                        p1 = roundDownToHundred((cost / (1 - master.m1)) * (1 + master.vat));
                        p2 = roundDownToHundred((cost / (1 - master.m2)) * (1 + master.vat));
                    }

                    finalResults.push({ 'Barcode': barcode, 'Tên hàng hoá': master ? master.name : 'N/A', 'Giá vốn': cost, 'Giá bán KV 1': p1, 'Giá bán KV 2': p2 });
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-mono font-bold text-slate-700">${barcode}</td>
                        <td class="px-6 py-4 text-slate-500">${master ? master.name : 'N/A'}</td>
                        <td class="px-6 py-4 text-right font-medium">${cost.toLocaleString('vi-VN')}</td>
                        <td class="px-6 py-4 text-right text-blue-700 font-bold bg-blue-50/30">${p1.toLocaleString('vi-VN')}</td>
                        <td class="px-6 py-4 text-right text-green-700 font-bold bg-green-50/30">${p2.toLocaleString('vi-VN')}</td>
                    `;
                    tbody.appendChild(tr);
                });
                document.getElementById('resultSection').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('downloadTemplate').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet([{ "barcode": "893...", "giá vốn": 0 }]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Template_Genshai.xlsx");
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(finalResults);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Gia_Ban");
            XLSX.writeFile(wb, `Bao_Gia_Genshai_${new Date().toLocaleDateString('vi-VN').replace(/\//g, '-')}.xlsx`);
        });
    </script>
</body>
</html>
