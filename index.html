<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính giá bán - Genshai Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-bold text-blue-800">Công cụ tính giá bán</h1>
            <div id="status" class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 font-medium">
                Đang tải Master Data...
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <h2 class="text-xl font-semibold mb-4">Upload File Giá Vốn</h2>
            <input type="file" id="inputFile" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100" disabled />
            <p class="text-xs text-gray-500 mt-2 italic">* Cột bắt buộc: <span class="font-bold">barcode, giá vốn</span></p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow border border-gray-200 hidden" id="resultSection">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Kết Quả Tính Toán</h2>
                <button id="exportBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow">
                    Tải File Excel (.xlsx)
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="px-4 py-2 border">Barcode</th>
                            <th class="px-4 py-2 border">Tên hàng hoá</th>
                            <th class="px-4 py-2 border text-right">Giá vốn</th>
                            <th class="px-4 py-2 border text-right">Giá bán KV 1</th>
                            <th class="px-4 py-2 border text-right">Giá bán KV 2</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let masterDataMap = {};
        let finalResults = [];

        // 1. Tự động tải Master Data khi mở trang
        window.onload = async () => {
            const statusEl = document.getElementById('status');
            try {
                // Tên file phải khớp chính xác với file anh upload lên Github
                const response = await fetch('master_data.xlsx');
                if (!response.ok) throw new Error('Không tìm thấy file master_data.xlsx');
                
                const arrayBuffer = await response.arrayBuffer();
                const data = processExcelData(arrayBuffer);
                
                data.forEach(row => {
                    if (row['barcode']) {
                        masterDataMap[row['barcode'].toString().trim()] = {
                            name: row['tên hàng hoá'],
                            margin1: normalizePercent(row['lợi nhuận Khu vực 1']),
                            margin2: normalizePercent(row['lợi nhuận Khu vực 2']),
                            vat: normalizePercent(row['VAT'])
                        };
                    }
                });

                statusEl.innerText = '● Master Data: Sẵn sàng';
                statusEl.className = 'text-sm px-3 py-1 rounded-full bg-green-100 text-green-700 font-medium';
                document.getElementById('inputFile').disabled = false;
            } catch (error) {
                statusEl.innerText = '● Lỗi nạp Master Data';
                statusEl.className = 'text-sm px-3 py-1 rounded-full bg-red-100 text-red-700 font-medium';
                console.error(error);
                alert('Không tìm thấy file "master_data.xlsx" trong repository. Vui lòng kiểm tra lại.');
            }
        };

        function processExcelData(buffer) {
            const workbook = XLSX.read(buffer, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            return XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
        }

        function normalizePercent(val) {
            let n = parseFloat(val) || 0;
            return n > 1 ? n / 100 : n;
        }

        // 2. Xử lý File Giá Vốn từ User
        document.getElementById('inputFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const data = processExcelData(event.target.result);
                renderResults(data);
            };
            reader.readAsArrayBuffer(file);
        });

        function renderResults(data) {
            finalResults = [];
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';

            data.forEach(row => {
                let barcode = row['barcode'] ? row['barcode'].toString().trim() : '';
                let cost = parseFloat(row['giá vốn']) || 0;
                let master = masterDataMap[barcode] || null;

                let res = {
                    'Barcode': barcode,
                    'Tên hàng hoá': master ? master.name : 'N/A',
                    'Giá vốn': cost,
                    'Giá bán KV 1': master ? Math.round((cost / (1 - master.margin1)) * (1 + master.vat)) : 0,
                    'Giá bán KV 2': master ? Math.round((cost / (1 - master.margin2)) * (1 + master.vat)) : 0
                };

                finalResults.push(res);
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="px-4 py-2 border font-mono">${res['Barcode']}</td>
                    <td class="px-4 py-2 border">${res['Tên hàng hoá']}</td>
                    <td class="px-4 py-2 border text-right">${res['Giá vốn'].toLocaleString('vi-VN')}</td>
                    <td class="px-4 py-2 border text-right text-blue-600 font-bold">${res['Giá bán KV 1'].toLocaleString('vi-VN')}</td>
                    <td class="px-4 py-2 border text-right text-green-600 font-bold">${res['Giá bán KV 2'].toLocaleString('vi-VN')}</td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('resultSection').classList.remove('hidden');
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(finalResults);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Gia_Ban");
            XLSX.writeFile(wb, "Ket_Qua_Gia_Ban.xlsx");
        });
    </script>
</body>
</html>
